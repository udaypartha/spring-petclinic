apiVersion: apps/v1
kind: Deployment
metadata:
  name: uday-petclinic-deployv3
spec:
  replicas: 4
  selector:
    matchLabels:
      app: my-petclinicv3
  template:
    metadata:
      labels:
        app: my-petclinicv3
    spec:
      containers:
        - name: petclinic-container
          image: udayparthananda/spring-petclinic:v3
          imagePullPolicy: Always
          ports:
            - containerPort: 8082

---
apiVersion: v1
kind: Service
metadata:
  name: uday-petclinic-svc
spec:
  type: NodePort
  selector:
    app: my-petclinicv2
  ports:
    - port: 8087
      targetPort: 8082
      nodePort: 30087



---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uday-petclinic-ingressv3
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: my-petclinic
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uday-petclinic-svc
                port:
                  number: 8087
